<!-- Page Header Asymmetric Layout -->
<div class="page-container">
<div class="page-header">
    <div>
        <h2 class="page-title">Create Packing Slip</h2>
        <p class="page-subtitle">Generate a packing slip for order fulfillment. Select items from work orders ready for shipment.</p>
    </div>
    <div class="flex gap-4">
        <button class="btn-preview">
            <i class="fas fa-print text-sm"></i>
            <span>Preview</span>
        </button>
    </div>
</div>

<!-- Slip Header Section (Asymmetric Tonal Grid) -->
<section class="section-grid mb-8">
    <div class="col-span-12 lg:col-span-8 card">
        <div class="form-row-3">
            <!-- Work Order Dropdown -->
            <div class="form-group">
                <label class="form-label">Work Order</label>
                <select class="form-input-underline">
                    <option>WO-2024-001 - Skyline Facades</option>
                    <option>WO-2024-002 - Lumina Glazing</option>
                    <option>WO-2024-003 - Stark Industries</option>
                </select>
            </div>
            <!-- Slip Number -->
            <div class="form-group">
                <label class="form-label">Slip Number</label>
                <input class="form-input-underline" placeholder="PS-0001" type="text"/>
            </div>
            <!-- Ship Date -->
            <div class="form-group">
                <label class="form-label">Ship Date</label>
                <input class="form-input-underline" type="date" value="2024-01-15"/>
            </div>
        </div>
    </div>
    
    <!-- Quick Summary / Metadata (Glassmorphism) -->
    <div class="col-span-12 lg:col-span-4 card-placeholder">
        <div class="card-placeholder-content">
            <i class="card-placeholder-icon fas fa-box"></i>
            <p class="card-placeholder-text">New Feature</p>
        </div>
    </div>
</section>

<!-- Shipping Details Section -->
<section class="section-grid mb-8">
    <div class="col-span-12 card">
        <h4 class="form-section-header">Ship To Address</h4>
        <div class="space-y-4">
            <div class="form-group">
                <label class="form-label">Company Name</label>
                <input class="form-input-underline" placeholder="Company name" type="text"/>
            </div>
            <div class="form-group">
                <label class="form-label">Street Address</label>
                <input class="form-input-underline" placeholder="Street address" type="text"/>
            </div>
            <div class="form-row-3">
                <div class="form-group">
                    <label class="form-label">City</label>
                    <input class="form-input-underline" placeholder="City" type="text"/>
                </div>
                <div class="form-group">
                    <label class="form-label">State</label>
                    <input class="form-input-underline" placeholder="State" type="text"/>
                </div>
                <div class="form-group">
                    <label class="form-label">ZIP</label>
                    <input class="form-input-underline" placeholder="ZIP" type="text"/>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- Items Selection (Industrial Technical Ledger Style) -->
<section class="bg-surface-container-lowest shadow-sm rounded-sm overflow-hidden flex flex-col">
    <div class="flex justify-between items-center px-8 py-6 bg-surface-container-low border-b border-outline-variant/10">
        <h4 class="form-section-header mb-0">Items to Ship</h4>
        <div class="flex gap-4">
            <button class="btn-action">
                <i class="fas fa-plus-circle text-sm"></i>
                Add Item
            </button>
        </div>
    </div>
    
    <div class="overflow-x-auto">
        <table class="data-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Part Number</th>
                    <th>Description</th>
                    <th>Qty Ordered</th>
                    <th>Qty Shipping</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <!-- Empty state -->
                <tr>
                    <td colspan="6" class="px-8 py-12">
                        <div class="empty-state">
                            <i class="empty-state-icon fas fa-box-open"></i>
                            <p class="empty-state-title">No items selected</p>
                            <p class="empty-state-description">Select a work order to load available items</p>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</section>

<!-- Action Buttons -->
<div class="form-actions">
    <button class="btn-secondary">
        Cancel
    </button>
    <button class="btn-primary-large">
        <i class="fas fa-save"></i>
        Create Packing Slip
    </button>
</div>

</div>
