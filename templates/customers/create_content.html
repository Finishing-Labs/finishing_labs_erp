<!-- Page Header Asymmetric Layout -->
<div class="page-container">
    <div class="page-header">
        <div>
            <h2 class="page-title">New Customer</h2>
            <p class="page-subtitle">Add a new customer to the system. Maintain accurate contact
                and billing information for streamlined operations.</p>
        </div>
        <div class="flex gap-4">
            <button class="btn-import">
                <i class="fas fa-file-import text-sm"></i>
                <span>Import</span>
            </button>
        </div>
    </div>

    <!-- Customer Information Section (Asymmetric Tonal Grid) -->
    <section class="section-grid mb-8">
        <div class="col-span-12 lg:col-span-8 card">
            <h4 class="form-section-header">Company Information</h4>
            <div class="space-y-6">
                <div class="form-row-2">
                    <div class="form-group">
                        <label class="form-label">Company
                            Name</label>
                        <input
                            class="form-input-underline"
                            placeholder="Enter company name" type="text" />
                    </div>
                    <div class="form-group">
                        <label
                            class="form-label">Industry</label>
                        <select
                            class="form-input-underline">
                            <option>Architectural</option>
                            <option>Construction</option>
                            <option>Manufacturing</option>
                            <option>Other</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <!-- Quick Summary / Metadata (Glassmorphism) -->
        <div class="col-span-12 lg:col-span-4 card-placeholder">
            <div class="card-placeholder-content">
                <i class="card-placeholder-icon fas fa-building"></i>
                <p class="card-placeholder-text">New Feature</p>
            </div>
        </div>
    </section>

    <!-- Contact Details Section -->
    <section class="section-grid mb-8">
        <div class="col-span-12 lg:col-span-6 card">
            <h4 class="form-section-header">Primary Contact</h4>
            <div class="space-y-4">
                <div class="form-group">
                    <label class="form-label">Contact
                        Name</label>
                    <input
                        class="form-input-underline"
                        placeholder="Full name" type="text" />
                </div>
                <div class="form-group">
                    <label class="form-label">Email
                        Address</label>
                    <input
                        class="form-input-underline"
                        placeholder="email@company.com" type="email" />
                </div>
                <div class="form-row-2">
                    <div class="form-group">
                        <label
                            class="form-label">Phone</label>
                        <input
                            class="form-input-underline"
                            placeholder="(555) 123-4567" type="tel" />
                    </div>
                    <div class="form-group">
                        <label
                            class="form-label">Extension</label>
                        <input
                            class="form-input-underline"
                            placeholder="Ext." type="text" />
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Job
                        Title</label>
                    <input
                        class="form-input-underline"
                        placeholder="Position" type="text" />
                </div>
            </div>
        </div>

        <div class="col-span-12 lg:col-span-6 card">
            <h4 class="form-section-header">Billing Address</h4>
            <div class="space-y-4">
                <div class="form-group">
                    <label class="form-label">Street
                        Address</label>
                    <input
                        class="form-input-underline"
                        placeholder="Street address" type="text" />
                </div>
                <div class="form-group">
                    <label class="form-label">Address Line
                        2</label>
                    <input
                        class="form-input-underline"
                        placeholder="Suite, floor, etc." type="text" />
                </div>
                <div class="form-row-3">
                    <div class="form-group">
                        <label
                            class="form-label">City</label>
                        <input
                            class="form-input-underline"
                            placeholder="City" type="text" />
                    </div>
                    <div class="form-group">
                        <label
                            class="form-label">State</label>
                        <input
                            class="form-input-underline"
                            placeholder="State" type="text" />
                    </div>
                    <div class="form-group">
                        <label
                            class="form-label">ZIP</label>
                        <input
                            class="form-input-underline"
                            placeholder="ZIP" type="text" />
                    </div>
                </div>
            </div>
        </div>
    </section>


    <!-- Notes Section -->
    <section class="card mb-8">
        <h4 class="form-section-header">Additional Notes</h4>
        <div class="form-group">
            <label class="form-label">Internal
                Notes</label>
            <textarea
                class="form-textarea"
                rows="4" placeholder="Special requirements, preferences, etc."></textarea>
        </div>
    </section>

    <!-- Action Buttons -->
    <div class="form-actions">
        <button class="btn-secondary">
            Cancel
        </button>
        <button class="btn-primary-large">
            <i class="fas fa-save"></i>
            Create Customer
        </button>
    </div>

</div>
