<!-- Page Header Asymmetric Layout -->
<div class="page-container">
<div class="page-header">
    <div>
        <h2 class="page-title">New Purchase Order</h2>
        <p class="page-subtitle">Initialize a new anodizing workflow. Ensure customer specifications match current tank chemistry requirements.</p>
    </div>
    <div class="flex gap-4">
        <button class="btn-import">
            <i class="fas fa-file-upload text-sm"></i>
            <span>Import PDF</span>
        </button>
    </div>
</div>

<!-- PO Header Section (Asymmetric Tonal Grid) -->
<section class="section-grid mb-8">
    <div class="col-span-12 lg:col-span-8 card">
        <div class="form-row-3">
            <!-- Customer Dropdown -->
            <div class="form-group">
                <label class="form-label">Customer Entity</label>
                <select class="form-input-underline">
                    <option>Skyline Facades Ltd</option>
                    <option>Lumina Glazing Corp</option>
                    <option>Aeroform Components</option>
                    <option>Modernist Structures</option>
                </select>
            </div>
            <!-- PO Number -->
            <div class="form-group">
                <label class="form-label">PO Reference Number</label>
                <input class="form-input-underline" placeholder="PO-2024-001" type="text"/>
            </div>
            <!-- Date Picker -->
            <div class="form-group">
                <label class="form-label">Due Date</label>
                <input class="form-input-underline" type="date" value="2024-01-15"/>
            </div>
        </div>
    </div>
    
    <!-- Quick Summary / Metadata (Glassmorphism) -->
    <div class="col-span-12 lg:col-span-4 card-placeholder">
        <div class="card-placeholder-content">
            <i class="card-placeholder-icon fas fa-cogs"></i>
            <p class="card-placeholder-text">New Feature</p>
        </div>
    </div>
</section>

<!-- Line Items Entry (Industrial Technical Ledger Style) -->
<section class="bg-surface-container-lowest shadow-sm rounded-sm overflow-hidden flex flex-col">
    <div class="flex justify-between items-center px-8 py-6 bg-surface-container-low border-b border-outline-variant/10">
        <h4 class="form-section-header mb-0">Line Item Specifications</h4>
        <div class="flex gap-4">
            <button class="btn-action">
                <i class="fas fa-plus-circle text-sm"></i>
                Bulk Add
            </button>
        </div>
    </div>
    
    <div class="overflow-x-auto">
        <table class="data-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Part Number</th>
                    <th>Qty (Units)</th>
                    <th>Anodizing Type</th>
                    <th>Color Code</th>
                    <th>Notes</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <!-- Row 1 -->
                <tr>
                    <td class="row-number">01</td>
                    <td>
                        <input type="text" value="AL-EXT-4022"/>
                    </td>
                    <td>
                        <input class="w-20" type="number" value="150"/>
                    </td>
                    <td>
                        <select>
                            <option>Type II - Clear</option>
                            <option>Type III - Hardcoat</option>
                            <option>Type I - Chromic</option>
                        </select>
                    </td>
                    <td>
                        <div class="flex items-center gap-2">
                            <div class="w-4 h-4 rounded-full bg-slate-400"></div>
                            <input type="text" value="Satin Silver"/>
                        </div>
                    </td>
                    <td>
                        <input class="text-xs text-on-surface-variant italic" placeholder="Add specific sealer requirements..." type="text"/>
                    </td>
                    <td class="text-right">
                        <button class="delete-btn">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </td>
                </tr>
                
                <!-- Row 2 -->
                <tr>
                    <td class="row-number">02</td>
                    <td>
                        <input type="text" value="BR-PLT-990"/>
                    </td>
                    <td>
                        <input class="w-20" type="number" value="45"/>
                    </td>
                    <td>
                        <select>
                            <option>Type III - Hardcoat</option>
                            <option>Type II - Clear</option>
                        </select>
                    </td>
                    <td>
                        <div class="flex items-center gap-2">
                            <div class="w-4 h-4 rounded-full bg-slate-900"></div>
                            <input type="text" value="Obsidian Black"/>
                        </div>
                    </td>
                    <td>
                        <input class="text-xs text-on-surface-variant italic" type="text" value="Double-dip dye required"/>
                    </td>
                    <td class="text-right">
                        <button class="delete-btn">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </td>
                </tr>
                
                <!-- Active Entry Row -->
                <tr class="active-row">
                    <td class="row-number">03</td>
                    <td>
                        <input autofocus placeholder="Type Part #..." type="text"/>
                    </td>
                    <td>
                        <input class="w-20" placeholder="0" type="number"/>
                    </td>
                    <td>
                        <select class="text-on-surface-variant/50">
                            <option>Select Type...</option>
                            <option>Type I</option>
                            <option>Type II</option>
                            <option>Type III</option>
                        </select>
                    </td>
                    <td>
                        <input placeholder="RAL Code..." type="text"/>
                    </td>
                    <td>
                        <input class="text-xs italic" placeholder="Notes..." type="text"/>
                    </td>
                    <td class="text-right">
                        <span class="text-[10px] font-bold text-tertiary-fixed-dim uppercase">Active</span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    
    <!-- Footer of Table -->
    <div class="data-table-footer">
        <div class="data-table-footer-action">
            <i class="fas fa-plus-circle text-sm"></i>
            Press [Enter] for new row
        </div>
        <div class="data-table-footer-stats">
            <div class="data-table-stat">
                <span class="data-table-stat-label">Total Units</span>
                <span class="data-table-stat-value">0</span>
            </div>
            <div class="data-table-stat">
                <span class="data-table-stat-label">Line Items</span>
                <span class="data-table-stat-value">0</span>
            </div>
        </div>
    </div>
</section>

<!-- Action Controls -->
<div class="flex justify-end gap-6 pt-4">
    <button class="btn-secondary">
        Discard Draft
    </button>
    <button class="btn-primary-large">
        Generate New PO
    </button>
</div>
</div>
